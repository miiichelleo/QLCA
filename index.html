<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QLCA</title>

<style>
        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 100;

            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .menu {
         text-decoration: none;

    }
        body {
            font-family: "inter", sans-serif;
            background: linear-gradient(180deg, #EDEBEB 0%, #F5F5F5 50.48%);
            color: black;
    }
        #intro {
            position:relative;
            background: linear-gradient(180deg, #EDEBEB 0%, #F5F5F5 50.48%);
            margin: auto;
            padding-top: 1rem;
            padding-bottom: 2rem;
            
    
        }
        .square {

            height: 20rem;
            width: 20rem;
            outline: dashed black 1px;
            

        }
		#horiz-scrolly {
			position: relative;
			background-color: #f3f3f3;
			padding: 1rem;
		}

		#horiz-scrolly article {
			position: relative;
			padding: 0;
			max-width: 20rem;
			margin: 0 auto;
		}

		#horiz-scrolly figure {
			position: -webkit-sticky;
			position: sticky;
			left: 0;
			width: 100%;
			margin: 0;
			-webkit-transform: translate3d(0, 0, 0);
			-moz-transform: translate3d(0, 0, 0);
			transform: translate3d(0, 0, 0);
			background-color: #8a8a8a;
			z-index: 0;
		}

		#horiz-scrolly figure p {
			text-align: center;
			padding: 1rem;
			position: absolute;
			top: 50%;
			left: 50%;
			-moz-transform: translate(-50%, -50%);
			-webkit-transform: translate(-50%, -50%);
			transform: translate(-50%, -50%);
			font-size: 8rem;
			font-weight: 900;
			color: #fff;
		}

		#horiz-scrolly .step {
			margin: 0 auto 2rem auto;
			color: #fff;
			background-color: rgba(0, 0, 0, 0.1);
		}

		#horiz-scrolly .step:last-child {
			margin-bottom: 0;
		}

		#horiz-scrolly .step.is-active p {
			background-color: goldenrod;
			color: #3b3b3b;
		}

		#horiz-scrolly .step p {
			text-align: center;
			padding: 1rem;
			font-size: 1.5rem;
			background-color: #3b3b3b;
		}


        		#vertic-scrolly {
			position: relative;
			display: -webkit-box;
			display: -ms-flexbox;
			display: flex;
			background-color: #f3f3f3;
			padding: 1rem;
		}

		#vertic-scrolly>* {
			-webkit-box-flex: 1;
			-ms-flex: 1;
			flex: 1;
		}

		#vertic-scrolly article {
			position: relative;
			padding: 0 1rem;
			max-width: 20rem;
		}

		#vertic-scrolly figure {
			position: -webkit-sticky;
			position: sticky;
			width: 100%;
			margin: 0;
			-webkit-transform: translate3d(0, 0, 0);
			-moz-transform: translate3d(0, 0, 0);
			transform: translate3d(0, 0, 0);
			background-color: #8a8a8a;
			z-index: 0;
		}

		#vertic-scrolly figure p {
			text-align: center;
			padding: 1rem;
			position: absolute;
			top: 50%;
			left: 50%;
			-moz-transform: translate(-50%, -50%);
			-webkit-transform: translate(-50%, -50%);
			transform: translate(-50%, -50%);
			font-size: 8rem;
			font-weight: 900;
			color: #fff;
		}

		#vertic-scrolly .step {
			margin: 0 auto 2rem auto;
			background-color: #3b3b3b;
			color: #fff;
		}

		#vertic-scrolly .step:last-child {
			margin-bottom: 0;
		}

		#vertic-scrolly .step.is-active {
			background-color: goldenrod;
			color: #3b3b3b;
		}

		#vertic-scrolly .step p {
			text-align: center;
			padding: 1rem;
			font-size: 1.5rem;
		}
	</style>

<!--Header-->

<header class="header">
<div class="menu">Chapters</div>
</header>

<!--Section 1: Homepage-->

<body>
	<main>
		<section id="intro">
			<h1 class="intro__hed">SUSTAINABLE<br>URBAN<br>PLANNING</h1>
			<p class="intro__dek">
				A modular approach to<br>Urban Life Cycle Assessments
			</p>
            <p class="intro__nav">
				SCROLL ↓
			</p>
            <div class="square"></div>
		</section>

        
<!--Section 2: Intro-->
		<section id="horiz-scrolly">
			<figure style="height: 380.5px; top: 190.25px;">
				<p>1</p>
			</figure>

			<article>
				<div class="step is-active" data-step="1" style="height: 570px;" data-scrollama-index="0">
					<p>STEP 1</p>
				</div>
				<div class="step" data-step="2" style="height: 570px;" data-scrollama-index="1">
					<p>STEP 2</p>
				</div>
				<div class="step" data-step="3" style="height: 570px;" data-scrollama-index="2">
					<p>STEP 3</p>
				</div>
				<div class="step" data-step="4" style="height: 570px;" data-scrollama-index="3">
					<p>STEP 4</p>
				</div>
			</article>
		</section>


<!--Section 2: Concept-->
		<section id="vertic-scrolly">
			<article>
				<div class="step is-active" data-step="1" style="height: 570px;" data-scrollama-index="0">
					<p>STEP 1</p>
				</div>
				<div class="step" data-step="2" style="height: 570px;" data-scrollama-index="1">
					<p>STEP 2</p>
				</div>
				<div class="step" data-step="3" style="height: 570px;" data-scrollama-index="2">
					<p>STEP 3</p>
				</div>
				<div class="step" data-step="4" style="height: 570px;" data-scrollama-index="3">
					<p>STEP 4</p>
				</div>
			</article>

			<figure style="height: 380.5px; top: 190.25px;">
				<p>1</p>
			</figure>
		</section>

	</main>

	<!-- <div class='debug'></div> -->
	<script src="./Scrollama_ Sticky Side Example_files/d3.min.js"></script>
	<script src="./Scrollama_ Sticky Side Example_files/scrollama.min.js"></script>
	<script>
		// using d3 for convenience
		var main = d3.select("main");
		var scrolly = main.select("#scrolly");
		var figure = scrolly.select("figure");
		var article = scrolly.select("article");
		var step = article.selectAll(".step");

		// initialize the scrollama
		var scroller = scrollama();

		// generic window resize listener event
		function handleResize() {
			// 1. update height of step elements
			var stepH = Math.floor(window.innerHeight * 0.75);
			step.style("height", stepH + "px");

			var figureHeight = window.innerHeight / 2;
			var figureMarginTop = (window.innerHeight - figureHeight) / 2;

			figure
				.style("height", figureHeight + "px")
				.style("top", figureMarginTop + "px");

			// 3. tell scrollama to update new element dimensions
			scroller.resize();
		}

		// scrollama event handlers
		function handleStepEnter(response) {
			console.log(response);
			// response = { element, direction, index }

			// add color to current step only
			step.classed("is-active", function (d, i) {
				return i === response.index;
			});

			// update graphic based on step
			figure.select("p").text(response.index + 1);
		}

		function init() {

			// 1. force a resize on load to ensure proper dimensions are sent to scrollama
			handleResize();

			// 2. setup the scroller passing options
			// 		this will also initialize trigger observations
			// 3. bind scrollama event handlers (this can be chained like below)
			scroller
				.setup({
					step: "#scrolly article .step",
					offset: 0.33,
					debug: false
				})
				.onStepEnter(handleStepEnter);
		}

		// kick things off
		init();
	</script>


</body></html>
